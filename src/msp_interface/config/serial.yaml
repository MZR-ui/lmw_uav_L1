# 串口配置参数
# port: "/dev/ttyACM0"   # 飞控连接的串口设备
port: "/dev/ttyACM0"   # 飞控连接的串口设备
baud: 115200           # 波特率，必须与飞控设置一致
debug: true           # 调试模式开关（如需更详细日志可设为 true）

# 主循环频率 (Hz)
loop_rate: 1000.0

# 传感器请求频率 (Hz)
sensor_rate: 50.0

# 模拟通道数据 (仅测试用)
simulate_channels: false   # 启用模拟通道
channel_rate: 50.0         # 模拟通道发送频率